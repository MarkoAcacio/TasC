<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TasC</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="login-page">

    <!-- Brand centered top -->
    <div class="login-brand fade-up">
      <a href="index.html" class="brand-link">Tas<span>·</span>C</a>
      <p class="brand-sub">A planner for considered work</p>
    </div>

    <!-- Auth card -->
    <div class="login-card fade-up" style="animation-delay:0.1s;">

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin">Sign in</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <!-- Sign In -->
      <form class="auth-form active" id="signin-form" data-form="signin" onsubmit="handleSignIn(event)">
        <div class="field">
          <label for="signin-email">Email</label>
          <input type="email" id="signin-email" name="Email" maxlength="255" required placeholder="you@domain.com" />
        </div>
        <div class="field">
          <label for="signin-password">Password</label>
          <input type="password" id="signin-password" name="Password" required placeholder="••••••••" />
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="remember" />
          <label for="remember" style="text-transform:none;letter-spacing:0;font-size:0.9rem;color:var(--ink-soft);margin:0;">
            Keep me signed in
          </label>
        </div>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>

      <!-- Register -->
      <form class="auth-form" id="register-form" data-form="register" onsubmit="handleRegister(event)">
        <div class="field-row">
          <div class="field">
            <label for="reg-first">First name</label>
            <input type="text" id="reg-first" name="FirstName" maxlength="100" required placeholder="Jane" />
          </div>
          <div class="field">
            <label for="reg-last">Last name</label>
            <input type="text" id="reg-last" name="LastName" maxlength="100" required placeholder="Doe" />
          </div>
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" name="Email" maxlength="255" required placeholder="you@domain.com" />
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="Password" minlength="8" required placeholder="At least 8 characters" />
        </div>
        <button type="submit" class="btn btn-primary">Create account</button>
      </form>

    </div>

    <!-- Decorative ornament -->
    <div class="login-ornament">·</div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
