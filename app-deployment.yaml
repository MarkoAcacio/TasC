apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasc-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasc
  template:
    metadata:
      labels:
        app: tasc
    spec:
      containers:
        - name: tasc
          image: tasc-app-velardeacaciomejida:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_NAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: mysql-password