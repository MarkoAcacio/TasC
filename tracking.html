<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracking — TasC</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/tracking.css" />
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">Tas<span>·</span>C</a>
    <div class="nav-right">
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="calendar.html">Calendar</a>
        <a href="tracking.html" class="active">Tracking</a>
      </div>

      <!-- Notification Bell -->
      <div class="notif-wrap">
        <button class="notif-btn" id="notif-btn" aria-label="Notifications" onclick="toggleNotifDropdown()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot" id="notif-dot" style="display:none;"></span>
        </button>

        <div class="notif-dropdown" id="notif-dropdown">
          <div class="notif-header">
            <span class="eyebrow">Notifications</span>
          </div>
          <div class="notif-list" id="notif-list">
            <p class="notif-empty">No urgent tasks right now.</p>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header fade-up">
      <div>
        <span class="eyebrow">Section II</span>
        <h1 class="serif">Tracking</h1>
      </div>
      <a href="calendar.html" class="btn btn-primary">+ New Task</a>
    </div>

    <div class="stats">
      <div class="stat-card fade-up" style="animation-delay: 0.05s;">
        <div class="stat-label">Total tasks</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-sub">Across all dates</div>
      </div>
      <div class="stat-card done fade-up" style="animation-delay: 0.1s;">
        <div class="stat-label">Completed</div>
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-sub" id="stat-done-pct">0% complete</div>
      </div>
      <div class="stat-card progress fade-up" style="animation-delay: 0.15s;">
        <div class="stat-label">In progress</div>
        <div class="stat-value" id="stat-progress">0</div>
        <div class="stat-sub">Currently active</div>
      </div>
      <div class="stat-card high fade-up" style="animation-delay: 0.2s;">
        <div class="stat-label">High priority</div>
        <div class="stat-value" id="stat-high">0</div>
        <div class="stat-sub">Need attention</div>
      </div>
    </div>

    <div class="filter-bar fade-up" style="animation-delay: 0.25s;">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="search" placeholder="Task name…" oninput="render()" />
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="filter-status" onchange="render()">
          <option value="all">All</option>
          <option value="Pending">Pending</option>
          <option value="In progress">In progress</option>
          <option value="Done">Done</option>
          <option value="Snoozed">Snoozed</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Priority</label>
        <select id="filter-priority" onchange="render()">
          <option value="all">All</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
      <div class="filter-spacer"></div>
      <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Reset</button>
    </div>

    <div class="table-wrap fade-up" style="animation-delay: 0.3s;">
      <table>
        <thead>
          <tr>
            <th class="sortable" onclick="sortBy('TaskID')">ID <span class="sort-arrow">↕</span></th>
            <th class="sortable" onclick="sortBy('TaskName')">Task <span class="sort-arrow">↕</span></th>
            <th class="sortable" onclick="sortBy('TaskDate')">Date <span class="sort-arrow">↕</span></th>
            <th>Time</th>
            <th class="sortable" onclick="sortBy('TaskDuration')">Duration <span class="sort-arrow">↕</span></th>
            <th>Priority</th>
            <th>Status</th>
            <th>Reminder</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="task-tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="js/tracking.js"></script>
</body>
</html>
