name: TasC API Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          echo "DB_HOST=db" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "PORT=3000" >> .env

      - name: Start containers
        run: docker compose up --build -d -v

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/auth/login > /dev/null 2>&1; then
              echo "✅ App is ready!"
              break
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done

      - name: Check containers are running
        run: docker compose ps

      - name: Register a user
        run: |
          curl -f -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"firstName":"Jane","lastName":"Doe","email":"jane@test.com","password":"secret123"}'

      - name: Login and save token
        run: |
          TOKEN=$(curl -s -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"jane@test.com","password":"secret123"}' \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Create a task
        run: |
          curl -f -X POST http://localhost:3000/api/tasks \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            -d '{"taskName":"Test Task","taskDate":"2026-05-10","taskTime":"09:00:00","priority":"High"}'

      - name: Get tasks
        run: |
          curl -f http://localhost:3000/api/tasks \
            -H "Authorization: Bearer ${{ env.TOKEN }}"

      - name: Show logs if failed
        if: failure()
        run: docker compose logs
